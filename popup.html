<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        width: 280px;
        padding: 15px;
      }

      input {
        width: 90%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ccc;
      }

      button {
        width: 98%;
        padding: 10px;
        margin-top: 10px;
        cursor: pointer;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 5px;
      }

      .hidden {
        display: none;
      }

      .user-box {
        background: #f5f5f5;
        padding: 10px;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <!-- LOGIN UI -->
    <div id="loginBox">
      <h3>Login</h3>

      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <button id="loginBtn">Login</button>
    </div>

    <!-- DASHBOARD UI -->
    <div id="userBox" class="hidden">
      <div class="user-box">
        <p id="userEmail"></p>
        <p id="trackingStatus">Tracker is sharing your screen.</p>
        <p id="trackerTime" style="font-weight: bold; color: #1a73e8">
          Time: 00h 00m 00s
        </p>
      </div>

      <button id="startBtn" class="hidden">Start</button>
      <button id="stopBtn" class="hidden">Stop</button>
      <button id="stopSharingBtn" class="hidden" style="background: #d32f2f">
        Stop Sharing
      </button>
      <button id="logoutBtn">Logout</button>
    </div>

    <!-- Toast Notification -->
    <div
      id="screenshotToast"
      style="
        display: none;
        position: fixed;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%);
        background: #323232;
        color: #fff;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 15px;
        z-index: 9999;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        opacity: 0;
        transition:
          opacity 0.3s,
          transform 0.3s;
        pointer-events: none;
      "
    >
      Screenshot captured
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
