<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        width: 280px;
        padding: 15px;
      }

      input {
        width: 90%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ccc;
      }

      button {
        width: 98%;
        padding: 10px;
        margin-top: 10px;
        cursor: pointer;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 5px;
      }

      .hidden {
        display: none;
      }

      .user-box {
        background: #f5f5f5;
        padding: 10px;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <!-- LOGIN UI -->
    <div id="loginBox">
      <h3>Login</h3>

      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <button id="loginBtn">Login</button>
    </div>

    <!-- DASHBOARD UI -->
    <div id="userBox" class="hidden">
      <div class="user-box">
        <p id="userEmail"></p>
        <p>Tracking Active</p>
      </div>

      <button id="logoutBtn">Logout</button>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
